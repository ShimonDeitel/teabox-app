<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Teabox</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#0E140D; color:#eee; font-family:-apple-system,Helvetica,Arial,sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; box-sizing:border-box; }
  .wrap { max-width:560px; }
  h1 { color:#4C7A3F; font-size:2.2rem; margin-bottom:0.5rem; }
  p { color:#ccc; line-height:1.6; }
  .badge { display:inline-block; margin-top:1.5rem; padding:0.6rem 1.4rem; border:1px solid #4C7A3F; border-radius:999px; color:#4C7A3F; text-decoration:none; }
  footer { margin-top:3rem; font-size:0.8rem; color:#777; }
  a { color:#4C7A3F; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4C7A3F55 0%, #4C7A3F00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Teabox - Tea Log</h1>
  <p>Track teas sampled with origin, steep time, and flavor notes.</p>
  <p>Pro unlocks: Origin stats & restock reminder list</p>
  <a class="badge" href="privacy.html">Privacy Policy</a>
  <a class="badge" href="terms.html">Terms of Use</a>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
