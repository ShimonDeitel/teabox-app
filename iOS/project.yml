name: Teabox
options:
  bundleIdPrefix: com.shimondeitel.tealog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Teabox:
    type: application
    platform: iOS
    sources:
      - path: Teabox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tealog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Teabox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TeaboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TeaboxTests
      - path: Teabox.storekit
    dependencies:
      - target: Teabox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tealog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TeaboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TeaboxUITests
    dependencies:
      - target: Teabox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tealog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Teabox:
    build:
      targets:
        Teabox: all
        TeaboxTests: [test]
        TeaboxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Teabox.storekit
    test:
      config: Debug
      storeKitConfiguration: Teabox.storekit
      targets:
        - TeaboxTests
        - TeaboxUITests
    archive:
      config: Release
